name: Verification CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verification-ci:
    name: Verification CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run linting
        run: yarn lint

      - name: Check code formatting
        run: yarn format:check

      - name: Build application
        run: yarn build

      - name: Run duplication check
        run: yarn duplication:check

      - name: Secrets scan
        run: yarn scan:secrets

      - name: Security audit
        run: yarn security:check
